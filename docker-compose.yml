# version: '3.8'
networks:
  likec4-net:
services:
  structurizr:
    # image: likec4/likec4:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: structurizr
    working_dir: /data
    volumes:
      - ./workspace:/data
    expose:
      - 8080
    # ports:
    #   - "5173:5173"     # Puerto del servidor web
    #   - "24678:24678"   # Puerto para HMR (Hot Module Reload)
    environment:
      CHOKIDAR_USEPOLLING: "1"   # Necesario para detectar cambios en algunos entornos
      CHOKIDAR_INTERVAL: "200"
    init: true
    tty: true
    # command: start --port 8080
    networks:
      - likec4-net
